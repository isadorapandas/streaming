<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titans' Streaming</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle" onclick="toggleTheme()" aria-label="Alternar tema" style="position:fixed;top:1rem;right:1rem;z-index:10;width:2.8rem;height:2.8rem;border-radius:50%;color:#fff;cursor:pointer;font-size:1.1rem;">⚪</button>
    <main>
        <header>
            <h1>Quem está assistindo?</h1>
        </header>
        <section class="profiles">
            <ul>
                <li class="profile">
                    <a href="catalogo/catalogo.html" class="link-perfil">
                        <img src="assets/robin.jpg" alt="Perfil 1">
                    </a>
                    <p class="nome-perfil">Robin</p>
                </li>
                <li class="profile">
                    <a href="catalogo/catalogo.html" class="link-perfil">
                        <img src="assets/estelar.jpg" alt="Perfil 2">
                    </a>
                    <p class="nome-perfil">Estelar</p>
                </li>
                <li class="profile">
                    <a href="catalogo/catalogo.html" class="link-perfil">
                        <img src="assets/ravena.jpg" alt="Perfil 3">
                    </a>
                    <p class="nome-perfil">Ravena</p>
                </li>
                <li class="profile">
                    <a href="catalogo/catalogo.html" class="link-perfil">
                        <img src="assets/mutano.jpg" alt="Perfil 4">
                    </a>
                    <p class="nome-perfil">Mutano</p>
                </li>
                <li class="profile">
                    <a href="catalogo/catalogo.html" class="link-perfil">
                        <img src="assets/ciborg.jpg" alt="Perfil 5">
                    </a>
                    <p class="nome-perfil">Ciborgue</p>
                </li>
            </ul>
        </section>
        <section class="manage-profiles">
            <button type="button" class="botao-gerenciar">
                <a href="catalogo/catalogo.html">Gerenciar perfis</a>
            </button>
        </section>
    </main>
    <footer>
        <p>&copy; Créditos das imagens: Gabriel Picolo/DC Comics</p>
    </footer>
    <script src="js/index.js"></script>
</body>
</html>
